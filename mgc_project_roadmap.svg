<svg width="100%" viewBox="0 0 680 520">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle">Music genre classification — build plan</text>

<!-- Phase 1 -->
<g class="c-teal">
<rect x="40" y="50" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="72" dominant-baseline="central">Phase 1: Data pipeline</text>
<text class="ts" x="60" y="90" dominant-baseline="central">Download GTZAN, validate, augment 30s to 3s clips, train/val/test split</text>
</g>

<line x1="340" y1="106" x2="340" y2="126" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 2 -->
<g class="c-purple">
<rect x="40" y="126" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="148" dominant-baseline="central">Phase 2: Feature engineering</text>
<text class="ts" x="60" y="166" dominant-baseline="central">MFCCs, spectral centroid, ZCR, mel-spectrograms, feature scaling</text>
</g>

<line x1="340" y1="182" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 3 -->
<g class="c-blue">
<rect x="40" y="202" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="224" dominant-baseline="central">Phase 3a: Traditional ML</text>
<text class="ts" x="60" y="242" dominant-baseline="central">SVM, Random Forest</text>
</g>
<g class="c-coral">
<rect x="350" y="202" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="224" dominant-baseline="central">Phase 3b: Deep learning</text>
<text class="ts" x="370" y="242" dominant-baseline="central">CNN on mel-spectrograms</text>
</g>

<line x1="185" y1="258" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>
<line x1="495" y1="258" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 4 -->
<g class="c-amber">
<rect x="40" y="282" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="304" dominant-baseline="central">Phase 4: Evaluation & analysis</text>
<text class="ts" x="60" y="322" dominant-baseline="central">Accuracy, F1, confusion matrix, feature importance, noise robustness</text>
</g>

<line x1="340" y1="338" x2="340" y2="358" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 5 -->
<g class="c-green">
<rect x="40" y="358" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="380" dominant-baseline="central">Phase 5: IEEE report (8 pages)</text>
<text class="ts" x="60" y="398" dominant-baseline="central">LaTeX write-up with tables, figures, comparison, references</text>
</g>

<line x1="340" y1="414" x2="340" y2="434" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 6 -->
<g class="c-gray">
<rect x="40" y="434" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="456" dominant-baseline="central">Phase 6 (stretch): Flask web app</text>
<text class="ts" x="60" y="474" dominant-baseline="central">Upload audio, real-time genre prediction demo</text>
</g>
</svg>